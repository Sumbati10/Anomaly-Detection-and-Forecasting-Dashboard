services:
  api:
    build: .
    environment:
      - ARTIFACTS_DIR=/app/artifacts
    ports:
      - "8000:8000"

  dashboard:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - .:/app
    command: ["bash", "-lc", "pip install --no-cache-dir -r requirements.txt && streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0"]
    environment:
      - API_URL=http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api
